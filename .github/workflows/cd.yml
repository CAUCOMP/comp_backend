name: CD Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/comp-backend
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USERNAME: ${{ secrets.EC2_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo "Image pushed with tags - ${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create SSH key file
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Create .env file
        run: |
          cat << EOF > .env.production
          DB_URL=${{ secrets.DB_URL }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD || '' }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ACCESS_TOKEN_VALIDITY=${{ secrets.JWT_ACCESS_TOKEN_VALIDITY }}
          JWT_REFRESH_TOKEN_VALIDITY=${{ secrets.JWT_REFRESH_TOKEN_VALIDITY }}
          SERVER_PORT=8080
          EOF

      - name: Copy deployment files to EC2
        run: |
          scp -i private_key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            .env.production \
            ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }}:/home/${{ env.EC2_USERNAME }}/.env

          scp -i private_key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            docker-compose.prod.yml \
            ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }}:/home/${{ env.EC2_USERNAME }}/docker-compose.yml

      - name: Deploy to EC2
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE_NAME }}
        run: |
          # EC2에서 배포 실행
          ssh -i private_key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }} \
            "DOCKERHUB_USERNAME='${DOCKERHUB_USERNAME}' \
             DOCKERHUB_TOKEN='${DOCKERHUB_TOKEN}' \
             DOCKER_IMAGE='${DOCKER_IMAGE}' \
             bash -s" << 'ENDSSH'

            echo "=== Docker Hub 로그인 ==="
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

            echo "=== 최신 이미지 pull ==="
            echo "Pulling image: ${DOCKER_IMAGE}:latest"
            docker pull ${DOCKER_IMAGE}:latest

            echo "=== 이미지 확인 ==="
            docker images | grep comp-backend

            echo "=== 기존 컨테이너 중지 및 제거 ==="
            docker-compose down || true

            echo "=== 환경변수 확인 ==="
            echo "Environment variables loaded from .env"
            export $(cat .env | grep -v '^#' | xargs)

            echo "=== 새 컨테이너 시작 ==="
            docker-compose up -d

            echo "=== 컨테이너 시작 대기 (30초) ==="
            sleep 30

            echo "=== 컨테이너 상태 확인 ==="
            docker-compose ps

            echo "=== 컨테이너 로그 확인 (최근 50줄) ==="
            docker-compose logs --tail=50

            echo "=== 사용하지 않는 이미지 정리 ==="
            docker image prune -af


            echo "✅ Deployment completed successfully!"
          ENDSSH

      - name: Health check
        run: |
          echo "=== Health Check 시작 ==="
          echo "EC2 Host: ${{ env.EC2_HOST }}"
          echo "Health Check URL: http://${{ env.EC2_HOST }}:8080/api/health"

          echo "애플리케이션 시작 대기 중... (30초)"
          sleep 30

          for i in {1..10}; do
            echo "=== Health check 시도 $i/10 ==="

            RESPONSE=$(curl -v -f --connect-timeout 10 --max-time 20 \
              http://${{ env.EC2_HOST }}:8080/api/health 2>&1) || true

            if echo "$RESPONSE" | grep -q "HTTP.*200"; then
              echo "✅ Health check 성공!"
              echo "$RESPONSE"
              exit 0
            fi

            echo "Health check 실패. 응답:"
            echo "$RESPONSE"

            echo "=== EC2 컨테이너 상태 확인 ==="
            ssh -i private_key.pem \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }} \
              'docker ps -a && docker-compose ps && docker-compose logs --tail=20'

            if [ $i -lt 10 ]; then
              echo "15초 후 재시도..."
              sleep 15
            fi
          done

          echo "❌ Health check 최종 실패"
          echo "=== 최종 디버깅 정보 ==="

          ssh -i private_key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }} \
            'docker-compose logs && docker images && ls -la .env docker-compose.yml'

          exit 1

      - name: Cleanup
        if: always()
        run: rm -f private_key.pem .env.production

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "🎉 Deployment successful to EC2: ${{ env.EC2_HOST }}"
          else
            echo "❌ Deployment failed"
          fi

