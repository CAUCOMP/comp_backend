spring.application.name=comp-web

# Test Environment - Use H2 in-memory database for fast testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Redis for tests (use embedded or mock if needed)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=test

# JWT Configuration for Tests
# ???? JWT ??? (256?? ??)
jwt.secret=test-jwt-secret-key-for-testing-environment-must-be-at-least-256-bits-long
jwt.access-token-validity=3600000
jwt.refresh-token-validity=86400000
