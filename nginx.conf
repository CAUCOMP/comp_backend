# Nginx 설정 (Optional - HTTPS 및 리버스 프록시)
# EC2에서 /etc/nginx/sites-available/comp-backend에 저장

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # HTTP -> HTTPS 리다이렉트 (Let's Encrypt 인증서 발급 후 활성화)
    # return 301 https://$server_name$request_uri;

    # 임시로 직접 프록시 (인증서 발급 전)
    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check 엔드포인트
    location /api/health {
        proxy_pass http://localhost:8080/api/health;
        access_log off;
    }

    # 정적 파일 캐싱 (필요시)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        proxy_pass http://localhost:8080;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 로그 설정
    access_log /var/log/nginx/comp-backend-access.log;
    error_log /var/log/nginx/comp-backend-error.log;
}

